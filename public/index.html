<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>simple.print</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>simple<span>.print</span></h1>
      <p>ZPL Label Printer</p>
    </header>

    <main>
      <form id="print-form">

        <section class="card">
          <h2>Label Content</h2>
          <div class="field-group">
            <label for="labelName">Label Name <span class="hint">(header text + barcode)</span></label>
            <input type="text" id="labelName" name="labelName" value="PHLABELS330" required />
          </div>
          <div class="field-group">
            <label for="deviceIp">Device IP <span class="hint">(bottom text)</span></label>
            <input type="text" id="deviceIp" name="deviceIp" value="10.180.2.113" required />
          </div>
        </section>

        <section class="card">
          <h2>Printer Target</h2>
          <div class="row">
            <div class="field-group">
              <label for="printerIp">Printer IP</label>
              <input type="text" id="printerIp" name="printerIp" value="10.164.0.100" required />
            </div>
            <div class="field-group short">
              <label for="printerPort">Port</label>
              <input type="number" id="printerPort" name="printerPort" value="9100" required />
            </div>
          </div>
        </section>

        <section class="card collapsible">
          <button type="button" class="collapse-toggle" aria-expanded="false">
            Advanced Label Settings <span class="chevron">▸</span>
          </button>
          <div class="collapse-body" hidden>
            <div class="row">
              <div class="field-group">
                <label for="printWidth">Print Width <span class="hint">(dots)</span></label>
                <input type="number" id="printWidth" name="printWidth" value="1200" />
              </div>
              <div class="field-group">
                <label for="labelLength">Label Length <span class="hint">(dots)</span></label>
                <input type="number" id="labelLength" name="labelLength" value="600" />
              </div>
            </div>
            <div class="row">
              <div class="field-group">
                <label for="fontSize">Font Size <span class="hint">(dots)</span></label>
                <input type="number" id="fontSize" name="fontSize" value="60" />
              </div>
              <div class="field-group">
                <label for="barcodeHeight">Barcode Height <span class="hint">(dots)</span></label>
                <input type="number" id="barcodeHeight" name="barcodeHeight" value="150" />
              </div>
            </div>
          </div>
        </section>

        <section class="card preview-card">
          <h2>Label Preview</h2>
          <div class="label-preview" id="label-preview">
            <div class="preview-top" id="preview-label-name">PHLABELS330</div>
            <div class="preview-barcode">
              <canvas id="barcode-canvas"></canvas>
              <div class="preview-barcode-text" id="preview-barcode-text">PHLABELS330</div>
            </div>
            <div class="preview-bottom" id="preview-device-ip">10.180.2.113</div>
          </div>
          <div class="zpl-block">
            <label>ZPL Output</label>
            <pre id="zpl-output"></pre>
          </div>
        </section>

        <div class="actions">
          <button type="submit" id="print-btn" class="btn-print">Print Label</button>
        </div>

      </form>
    </main>

    <div id="toast" class="toast" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
